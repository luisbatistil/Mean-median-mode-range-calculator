<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Measures of Central Tendency</title>
  </head>
  <body>
    <div id="container">
      <div id="header"><h1>Central Tendency Calculator | Ungroup data</h1></div>
      <div id="bodycontainer">
        <div id="input-container">
          <button id="inputadd">Create input</button>
          <button id="calculate">Calculate</button>
          <button id="deleteall">delete all</button>
        </div>
        <div id="inputbox"></div>
        <div id="Result-container">
          <div>Mean: <span id="mean"></span></div>
          <div>Median: <span id="median"></span></div>
          <div>Mode: <span id="mode"></span></div>
          <div>Range: <span id="range"></span></div>
        </div>
      </div>
      <div id="footer">
        <h4>&copy;all right reserve coding with luis</h4>
      </div>
    </div>
    <script src="script.js"></script>
